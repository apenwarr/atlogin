# fly.toml app configuration file generated for atlogin on 2026-01-12T19:27:23+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'atlogin'
primary_region = 'arn'

[build]
  [build.args]
    GO_VERSION = '1.25.5'

[env]
  PORT = '9411'

[http_service]
  internal_port = 9411
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
